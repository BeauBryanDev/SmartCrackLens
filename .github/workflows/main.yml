name :  SmartCrackLens CI 

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run test suite — Python 3.12
    runs-on: ubuntu-latest

    steps:

        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python 3.12
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"
            cache: "pip"

        - name: Install system dependencies
          run: |
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              libgl1 \
              libglib2.0-0 \
              libgomp1

        - name: Install Python dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-asyncio httpx pytest-cov mongomock-motor

        
        - name: Create required Directories 
          run:  |
            mkdir -p app/storage/rawImgs
            mkdir -p app/storage/outputs
            mkdir -p ml 

        - name :  Create dummy ONNX  model file 
          run : |
            touch ml/crack_detection_model.onnx 

        - name: Create .env file 
          run:  |
            cat > .env << EOF 
            MONGODB_URL=${{ secrets.MONGODB_URL }}
            DB_NAME=${{ secrets.DB_NAME }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=${{ secrets.ALGORITHM }}
            ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            ALLOWED_ORIGINS=http://localhost:3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}
            JWT_EXPIRE_MINUTES=${{ secrets.JWT_EXPIRE_MINUTES }}
            APP_NAME=SmartCrackLens
            APP_VERSION=1.0.0
            DEBUG=False
            EOF

        - name: Run pytest
          run: |
            pytest tests/ \
              --tb=short \
              --asyncio-mode=auto \
              -v \
              --cov=app \
              --cov-report=term-missing \
              --cov-report=xml:coverage.xml

        # Upload coverage report as an artifact
        - name: Upload coverage report
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: coverage-report
            path: coverage.xml
            retention-days: 7 
     
        
